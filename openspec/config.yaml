# OpenSpec configuration for Spec-Driven Development (SDD).
# schema: spec-driven (intended for OpenSpec tooling; currently a config-only placeholder).
schema: spec-driven

context: |
  Tech stack: pnpm monorepo; Astro 5 apps (portfolio, blog); Hono API on Cloudflare Workers; TypeScript; Tailwind CSS 4.
  Architecture: apps/* + packages/* workspace; static sites + worker API.
  Testing: Vitest for unit; Playwright for e2e.
  Style: Biome formatter/linter; Lefthook git hooks.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Identify stack languages/frameworks and versions; review key docs/diagrams; link starter templates/linters/configs; list owners/mentors per skill
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
