packages:
  - apps/*
  - packages/*

catalog:
  # Build and release tooling

  # Astro and frontend
  "@astrojs/check": 0.9.8
  "@astrojs/mdx": 5.0.3
  "@astrojs/partytown": ^2.1.6
  "@astrojs/rss": ^4.0.18
  "@astrojs/sitemap": ^3.7.2

  # Testing
  "@axe-core/playwright": 4.11.1
  "@biomejs/biome": 2.4.10

  # API and Cloudflare
  "@cloudflare/workers-types": ^4.20260405.1
  "@faker-js/faker": ^10.4.0
  "@hono/swagger-ui": 0.6.1
  "@hono/zod-openapi": 1.2.4
  "@iconify-json/lucide": ^1.2.101
  "@iconify-json/mdi": ^1.2.3
  "@iconify-json/simple-icons": ^1.2.76
  "@iconify-json/tabler": ^1.2.33

  # Content and data processing
  "@jsdevtools/rehype-toc": ^3.0.2
  "@notionhq/client": ^5.16.0
  "@playwright/test": 1.59.1
  "@tailwindcss/typography": ^0.5.19
  "@tailwindcss/vite": ^4.2.2
  "@testing-library/dom": ^10.4.1
  "@testing-library/preact": ^3.2.4

  # Type definitions
  "@types/fs-extra": ^11.0.4
  "@types/hast": ^3.0.4
  "@types/mdast": ^4.0.4
  "@types/node": 25.5.2
  "@types/service-worker-mock": ^2.0.4
  "@types/slug": ^5.0.9
  "@vitest/coverage-v8": ^4.1.4
  astro: 6.1.4
  astro-compress: 2.4.0
  astro-critters: 2.2.1
  astro-icon: ^1.1.5
  astro-pagefind: ^1.8.6

  # Security and compatibility overrides
  brace-expansion: ^5.0.5
  chanfana: ^3.3.0
  clsx: ^2.1.1
  cross-env: ^10.1.0
  crossrm: ^1.0.0
  fast-xml-parser: ^5.5.10
  fs-extra: ^11.3.4
  gray-matter: ^4.0.3
  h3: ^1.15.11
  handlebars: ^4.7.9
  happy-dom: ^20.8.9
  hono: ^4.12.12
  jsdom: ^29.0.1
  kleur: ^4.1.5
  lefthook: ^2.1.5
  mdast-util-to-string: ^4.0.0
  notion-rehype-k: ^1.1.6
  npm-run-all2: ^8.0.4
  pagefind: 1.5.0
  picomatch: ^4.0.4
  playwright: 1.59.1
  preact-render-to-string: ^6.6.7
  reading-time: ^1.5.0
  rehype-katex: ^7.0.1
  rehype-slug: ^6.0.0
  rehype-stringify: ^10.0.1
  rimraf: ^6.1.3
  satori: 0.26.0
  sharp: ^0.34.5
  slug: ^11.0.1
  tailwind-merge: ^3.5.0
  tailwindcss: ^4.2.2
  typescript: 6.0.2
  unified: ^11.0.5
  unist-util-visit: ^5.1.0
  unpic: ^4.2.2
  vfile: ^6.0.3
  vite: ^7.1.7
  vitest: ^4.1.4
  wrangler: ^4.80.0
  yaml: ^2.8.3
  zod: ^4.3.6

catalogMode: strict

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@cloudflare/workers-types"
  - miniflare
  - wrangler
  - typescript@6.0.2
  # Vite pinned to v7 for Astro 6 compatibility
  - vite@7.1.7
  # Renovate security update: hono@4.12.12
  - hono@4.12.12

overrides:
  brace-expansion: "catalog:"
  fast-xml-parser: "catalog:"
  h3: "catalog:"
  handlebars: "catalog:"
  picomatch: "catalog:"
  vite: "catalog:"
  yaml: "catalog:"
