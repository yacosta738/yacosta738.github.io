packages:
  - apps/*
  - packages/*

catalog:
  # Build and release tooling
  "@biomejs/biome": 2.4.9
  cross-env: ^10.1.0
  crossrm: ^1.0.0
  lefthook: ^2.1.4
  npm-run-all2: ^8.0.4
  playwright: 1.58.2
  rimraf: ^6.1.3
  typescript: 6.0.2
  vite: ^8.0.3
  vitest: ^4.1.2

  # Testing
  "@axe-core/playwright": 4.11.1
  "@playwright/test": 1.58.2
  "@testing-library/dom": ^10.4.1
  "@testing-library/preact": ^3.2.4
  "@vitest/coverage-v8": ^4.1.2
  "@faker-js/faker": ^10.4.0
  happy-dom: ^20.8.8
  jsdom: ^29.0.1

  # Astro and frontend
  "@astrojs/check": 0.9.8
  "@astrojs/mdx": 5.0.3
  "@astrojs/partytown": ^2.1.6
  "@astrojs/rss": ^4.0.18
  "@astrojs/sitemap": ^3.7.2
  "@iconify-json/lucide": ^1.2.99
  "@iconify-json/mdi": ^1.2.3
  "@iconify-json/simple-icons": ^1.2.75
  "@iconify-json/tabler": ^1.2.33
  "@tailwindcss/typography": ^0.5.19
  "@tailwindcss/vite": ^4.2.2
  astro: 6.1.1
  astro-compress: 2.4.0
  astro-critters: 2.2.1
  astro-icon: ^1.1.5
  astro-pagefind: ^1.8.6
  clsx: ^2.1.1
  gray-matter: ^4.0.3
  mdast-util-to-string: ^4.0.0
  pagefind: 1.4.0
  preact-render-to-string: ^6.6.7
  satori: 0.26.0
  sharp: ^0.34.5
  tailwind-merge: ^3.5.0
  tailwindcss: ^4.2.2
  unpic: ^4.2.2

  # Content and data processing
  "@jsdevtools/rehype-toc": ^3.0.2
  "@notionhq/client": ^5.15.0
  fs-extra: ^11.3.4
  kleur: ^4.1.5
  notion-rehype-k: ^1.1.6
  reading-time: ^1.5.0
  rehype-katex: ^7.0.1
  rehype-slug: ^6.0.0
  rehype-stringify: ^10.0.1
  slug: ^11.0.1
  unified: ^11.0.5
  unist-util-visit: ^5.1.0
  vfile: ^6.0.3

  # API and Cloudflare
  "@cloudflare/workers-types": ^4.20260329.1
  "@hono/swagger-ui": 0.6.1
  "@hono/zod-openapi": 1.2.4
  "@types/node": 25.5.0
  "@types/service-worker-mock": ^2.0.4
  chanfana: ^3.3.0
  hono: ^4.12.9
  wrangler: ^4.77.0
  zod: ^4.3.6

  # Type definitions
  "@types/fs-extra": ^11.0.4
  "@types/hast": ^3.0.4
  "@types/mdast": ^4.0.4
  "@types/slug": ^5.0.9

  # Security and compatibility overrides
  brace-expansion: ^5.0.5
  fast-xml-parser: ^5.5.9
  h3: ^1.15.10
  handlebars: ^4.7.9
  picomatch: ^4.0.4
  yaml: ^2.8.3

catalogMode: strict

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@cloudflare/workers-types"
  - miniflare
  - wrangler
  - typescript@6.0.2

overrides:
  brace-expansion: "catalog:"
  fast-xml-parser: "catalog:"
  h3: "catalog:"
  handlebars: "catalog:"
  picomatch: "catalog:"
  vite: "catalog:"
  yaml: "catalog:"
