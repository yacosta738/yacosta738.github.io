name: 'Setup monorepo (Node + pnpm)'
description: 'Lightweight composite action to setup Node.js and pnpm for repository workflows.'
author: 'automation'

inputs:
  node-version:
    description: 'Node.js version to install'
    required: false
    default: '22'
  pnpm-version:
    description: 'pnpm version to prepare via corepack (or fallback to npm install)'
    required: false
    default: '10'

outputs:
  cache-hit:
    description: 'Indicates whether a cache was hit (best-effort; default false)'
    value: ${{ steps.emit.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@${{ inputs.pnpm-version }} --activate

    - name: Verify pnpm installation
      shell: bash
      run: |
        echo "Verifying pnpm is available..."
        which pnpm
        pnpm --version

    - name: Get pnpm store directory
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Cache pnpm store
      id: pnpm-cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install dependencies
      shell: bash
      run: |
        pnpm run verify:workspace-lockfiles
        pnpm install --frozen-lockfile

    - id: emit
      name: Emit outputs
      shell: bash
      run: |
        echo "cache-hit=${{ steps.pnpm-cache.outputs.cache-hit || 'false' }}" >> $GITHUB_OUTPUT
