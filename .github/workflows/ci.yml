name: CI Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'specs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Cancel in-progress runs for same ref
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.30.2'

jobs:
  changes:
    name: 🧭 Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      portfolio: ${{ steps.filter.outputs.portfolio }}
      blog: ${{ steps.filter.outputs.blog }}
      api: ${{ steps.filter.outputs.api }}
      shared: ${{ steps.filter.outputs.shared }}
      workflows: ${{ steps.filter.outputs.workflows }}
      global: ${{ steps.filter.outputs.global }}
      any_ci: ${{ steps.flags.outputs.any_ci }}
      test_projects: ${{ steps.flags.outputs.test_projects }}
      build_projects: ${{ steps.flags.outputs.build_projects }}
      e2e_matrix: ${{ steps.flags.outputs.e2e_matrix }}
      has_test_projects: ${{ steps.flags.outputs.has_test_projects }}
      has_build_projects: ${{ steps.flags.outputs.has_build_projects }}
      has_e2e_apps: ${{ steps.flags.outputs.has_e2e_apps }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect affected areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            portfolio:
              - 'apps/portfolio/**'
            blog:
              - 'apps/blog/**'
            api:
              - 'apps/api/**'
            shared:
              - 'packages/shared/**'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
            global:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'biome.json'

      - name: Compute CI flags
        id: flags
        run: |
          run_all=false

          append_json_string() {
            local json="$1"
            local value="$2"
            jq -cn --argjson arr "$json" --arg value "$value" '$arr + [$value]'
          }

          append_e2e_entry() {
            local json="$1"
            local app="$2"
            jq -cn --argjson arr "$json" --arg app "$app" '$arr + [{app: $app, browser: "chromium"}]'
          }

          if [ "${{ steps.filter.outputs.portfolio }}" = 'true' ] || \
             [ "${{ steps.filter.outputs.blog }}" = 'true' ] || \
             [ "${{ steps.filter.outputs.api }}" = 'true' ] || \
             [ "${{ steps.filter.outputs.shared }}" = 'true' ] || \
             [ "${{ steps.filter.outputs.workflows }}" = 'true' ] || \
             [ "${{ steps.filter.outputs.global }}" = 'true' ]; then
            echo "any_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_ci=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ steps.filter.outputs.shared }}" = 'true' ] || \
             [ "${{ steps.filter.outputs.workflows }}" = 'true' ] || \
             [ "${{ steps.filter.outputs.global }}" = 'true' ]; then
            run_all=true
          fi

          test_projects='[]'
          build_projects='[]'
          e2e_matrix='[]'

          if [ "$run_all" = 'true' ]; then
            test_projects='["portfolio","blog","api"]'
            build_projects='["portfolio","blog","api"]'
            e2e_matrix='[{"app":"portfolio","browser":"chromium"},{"app":"blog","browser":"chromium"}]'
          else
            if [ "${{ steps.filter.outputs.portfolio }}" = 'true' ]; then
              test_projects="$(append_json_string "$test_projects" 'portfolio')"
              build_projects="$(append_json_string "$build_projects" 'portfolio')"
              e2e_matrix="$(append_e2e_entry "$e2e_matrix" 'portfolio')"
            fi

            if [ "${{ steps.filter.outputs.blog }}" = 'true' ]; then
              test_projects="$(append_json_string "$test_projects" 'blog')"
              build_projects="$(append_json_string "$build_projects" 'blog')"
              e2e_matrix="$(append_e2e_entry "$e2e_matrix" 'blog')"
            fi

            if [ "${{ steps.filter.outputs.api }}" = 'true' ]; then
              test_projects="$(append_json_string "$test_projects" 'api')"
              build_projects="$(append_json_string "$build_projects" 'api')"
            fi
          fi

          echo "test_projects=$test_projects" >> "$GITHUB_OUTPUT"
          echo "build_projects=$build_projects" >> "$GITHUB_OUTPUT"
          echo "e2e_matrix=$e2e_matrix" >> "$GITHUB_OUTPUT"

          if [ "$test_projects" = '[]' ]; then
            echo "has_test_projects=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_test_projects=true" >> "$GITHUB_OUTPUT"
          fi

          if [ "$build_projects" = '[]' ]; then
            echo "has_build_projects=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_build_projects=true" >> "$GITHUB_OUTPUT"
          fi

          if [ "$e2e_matrix" = '[]' ]; then
            echo "has_e2e_apps=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e_apps=true" >> "$GITHUB_OUTPUT"
          fi

  # Job 1: Setup & Lint (fastest checks first)
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.any_ci == 'true'
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      cache-key: ${{ steps.setup.outputs.cache-hit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup monorepo
        id: setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run lint checks
        uses: ./.github/actions/lint
        with:
          check-astro: 'true'
          notion-token: ${{ secrets.NOTION_TOKEN }}
          notion-database-id: ${{ secrets.NOTION_DATABASE_ID }}

      - name: Check AgentSync conventions
        run: pnpm agents:check
        continue-on-error: true

  # Job 2: Unit Tests (parallel with lint)
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.has_test_projects == 'true'
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.changes.outputs.test_projects) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup monorepo
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run unit tests
        uses: ./.github/actions/test-unit
        with:
          project: ${{ matrix.project }}
          coverage: 'true'
          upload-coverage: 'true'

  # Job 3: Build Projects (depends on lint)
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.has_build_projects == 'true'
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.changes.outputs.build_projects) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup monorepo
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Portfolio
        if: matrix.project == 'portfolio'
        uses: ./.github/actions/build-portfolio
        with:
          skip-check: 'false'
          upload-artifact: 'true'

      - name: Build API
        if: matrix.project == 'api'
        uses: ./.github/actions/build-api
        with:
          dry-run: 'true'

      - name: Build Blog
        if: matrix.project == 'blog'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PLATFORM_ID: ${{ secrets.NOTION_PLATFORM_ID }}
        run: pnpm --filter=blog build

  # Job 4: E2E Tests (depends on build)
  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.has_e2e_apps == 'true'
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.e2e_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup monorepo
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download portfolio build
        if: matrix.app == 'portfolio'
        uses: actions/download-artifact@v8
        with:
          name: portfolio-dist-${{ github.sha }}
          path: apps/portfolio/dist/
        continue-on-error: true

      - name: Run E2E tests
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PLATFORM_ID: ${{ secrets.NOTION_PLATFORM_ID }}
        uses: ./.github/actions/test-playwright
        with:
          app: ${{ matrix.app }}
          browser: ${{ matrix.browser }}
          upload-results: 'true'

  # Job 5: Code Quality Analysis
  code-quality:
    name: 📊 Code Quality
    runs-on: ubuntu-latest
    needs: [changes, unit-tests]
    if: |
      always() && (
        needs.changes.outputs.portfolio == 'true' ||
        needs.changes.outputs.blog == 'true' ||
        needs.changes.outputs.api == 'true' ||
        needs.changes.outputs.shared == 'true' ||
        needs.changes.outputs.workflows == 'true' ||
        needs.changes.outputs.global == 'true'
      )
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage/
          merge-multiple: true

      - name: Setup monorepo
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run targeted shared coverage for Sonar
        run: pnpm --filter=@portfolio/shared exec vitest run src/lib/seo/json-ld.test.ts src/core/tag/tag.mapper.test.ts src/i18n/types.test.ts src/i18n/ui.test.ts src/i18n/i18n.test.ts

      - name: Normalize shared LCOV paths
        run: |
          node -e "const fs=require('node:fs'); const path='packages/shared/coverage/lcov.info'; if (fs.existsSync(path)) { const content=fs.readFileSync(path,'utf8').replace(/^SF:src\//gm,'SF:packages/shared/src/'); fs.writeFileSync(path, content); }"

      - name: Validate LCOV reports exist
        id: coverage-check
        run: |
          ls -R coverage || true
          ls -R packages/shared/coverage || true
          if [ -n "$(find coverage packages -path '*/coverage/lcov.info' -print -quit 2>/dev/null)" ]; then
            echo "coverage_found=true" >> "$GITHUB_OUTPUT"
            echo "✅ LCOV reports detected."
          else
            echo "coverage_found=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No LCOV reports were found in downloaded artifacts or packages/*/coverage. SonarCloud scan will be skipped."
          fi

      - name: Validate Sonar token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "❌ SONAR_TOKEN is not configured in repository secrets."
            exit 1
          fi

      - name: SonarCloud Scan (PR)
        if: steps.coverage-check.outputs.coverage_found == 'true' && github.event_name == 'pull_request'
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=yacosta738_yacosta738.github.io
            -Dsonar.organization=yacosta738
            -Dsonar.sources=apps,packages
            -Dsonar.tests=apps,packages
            -Dsonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/tests/**
            -Dsonar.javascript.lcov.reportPaths=coverage/**/lcov.info,packages/*/coverage/lcov.info
            -Dsonar.exclusions=**/dist/**,**/coverage/**,**/node_modules/**,**/.astro/**,apps/blog/src/data/**,packages/shared/src/data/**
            -Dsonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**,**/tests/**
            -Dsonar.cpd.exclusions=**/content.config.ts,**/vitest.config.ts,**/playwright.config.ts,**/astro.config.mjs,**/organize-articles.js

      - name: SonarCloud Scan (Push/Main)
        id: sonar-main-scan
        if: steps.coverage-check.outputs.coverage_found == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=yacosta738_yacosta738.github.io
            -Dsonar.organization=yacosta738
            -Dsonar.sources=apps,packages
            -Dsonar.tests=apps,packages
            -Dsonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/tests/**
            -Dsonar.javascript.lcov.reportPaths=coverage/**/lcov.info,packages/*/coverage/lcov.info
            -Dsonar.exclusions=**/dist/**,**/coverage/**,**/node_modules/**,**/.astro/**,apps/blog/src/data/**,packages/shared/src/data/**
            -Dsonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**,**/tests/**
            -Dsonar.cpd.exclusions=**/content.config.ts,**/vitest.config.ts,**/playwright.config.ts,**/astro.config.mjs,**/organize-articles.js

      - name: SonarCloud main scan warning
        if: steps.sonar-main-scan.outcome == 'failure'
        run: |
          echo "::warning::SonarCloud main scan failed. Automatic Analysis is enabled in SonarCloud, which conflicts with CI analysis. Disable Automatic Analysis in SonarCloud project settings to re-enable strict CI gating."

      - name: SonarCloud skipped (no coverage artifacts)
        if: steps.coverage-check.outputs.coverage_found != 'true'
        run: |
          echo "⚠️ SonarCloud scan skipped because no LCOV artifacts were found."

      - name: SonarCloud skipped (non-main push)
        if: steps.coverage-check.outputs.coverage_found == 'true' && github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: |
          echo "ℹ️ SonarCloud scan skipped on non-main pushes to avoid branch-analysis conflicts with Automatic Analysis."

  # Job 6: Final Report
  report:
    name: 📋 Final Report
    runs-on: ubuntu-latest
    needs: [changes, lint, unit-tests, build, e2e-tests, code-quality]
    if: always()
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Generate pipeline summary
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          # 🎉 CI Pipeline Summary

          ## Job Status

          | Job | Status |
          |-----|--------|
          | 🧭 Detect Changes | ${{ needs.changes.result == 'success' && '✅' || needs.changes.result == 'skipped' && '⏭️' || '❌' }} |
          | 🔍 Lint | ${{ needs.lint.result == 'success' && '✅' || needs.lint.result == 'skipped' && '⏭️' || '❌' }} |
          | 🧪 Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅' || needs.unit-tests.result == 'skipped' && '⏭️' || '❌' }} |
          | 🏗️ Build | ${{ needs.build.result == 'success' && '✅' || needs.build.result == 'skipped' && '⏭️' || '❌' }} |
          | 🎭 E2E Tests | ${{ needs.e2e-tests.result == 'success' && '✅' || needs.e2e-tests.result == 'skipped' && '⏭️' || '❌' }} |
          | 📊 Code Quality | ${{ needs.code-quality.result == 'success' && '✅' || needs.code-quality.result == 'skipped' && '⏭️' || '⚠️' }} |

          **Overall Status**: ${{ (needs.lint.result != 'failure' && needs.lint.result != 'cancelled' && needs.unit-tests.result != 'failure' && needs.unit-tests.result != 'cancelled' && needs.build.result != 'failure' && needs.build.result != 'cancelled' && needs.e2e-tests.result != 'failure' && needs.e2e-tests.result != 'cancelled') && '✅ CI gates satisfied' || '❌ Some critical checks failed' }}
          EOF

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const status = {
              changes: '${{ needs.changes.result }}',
              lint: '${{ needs.lint.result }}',
              unit: '${{ needs.unit-tests.result }}',
              build: '${{ needs.build.result }}',
              e2e: '${{ needs.e2e-tests.result }}',
              quality: '${{ needs.code-quality.result }}'
            };

            const emoji = (result) => result === 'success' ? '✅' : result === 'skipped' ? '⏭️' : '❌';

            const marker = '<!-- ci-pipeline-report -->';
            const body = `${marker}
            ## 🤖 CI Pipeline Results

            | Check | Status |
            |-------|--------|
            | 🧭 Detect Changes | ${emoji(status.changes)} ${status.changes} |
            | 🔍 Lint & Type Check | ${emoji(status.lint)} ${status.lint} |
            | 🧪 Unit Tests | ${emoji(status.unit)} ${status.unit} |
            | 🏗️ Build | ${emoji(status.build)} ${status.build} |
            | 🎭 E2E Tests | ${emoji(status.e2e)} ${status.e2e} |
            | 📊 Code Quality | ${emoji(status.quality)} ${status.quality} |

            **Commit**: ${context.sha.substring(0, 7)}
            **Workflow**: [View Details](${context.payload.repository.html_url}/actions/runs/${context.runId})
            `;

            const comments = await github.paginate(github.rest.issues.listComments, {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Enforce final status
        run: |
          critical_fail=0

          for result in "${{ needs.lint.result }}" "${{ needs.unit-tests.result }}" "${{ needs.build.result }}" "${{ needs.e2e-tests.result }}"; do
            if [ "$result" = 'failure' ] || [ "$result" = 'cancelled' ]; then
              critical_fail=1
            fi
          done

          if [ "${{ github.event_name }}" = 'pull_request' ] && { [ "${{ needs.code-quality.result }}" = 'failure' ] || [ "${{ needs.code-quality.result }}" = 'cancelled' ]; }; then
            critical_fail=1
          fi

          exit "$critical_fail"
