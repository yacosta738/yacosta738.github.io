name: Playwright E2E Tests (Manual)

# NOTE: This workflow is disabled for automatic runs.
# E2E tests run as part of the CI Pipeline (ci.yml).
# Use workflow_dispatch for ad-hoc full browser matrix testing.
on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test'
        required: false
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
        default: 'all'

# Cancel in-progress E2E test runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  test:
    name: E2E Tests - ${{ matrix.app }} (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        app: [portfolio, blog]
        browser: ${{ github.event.inputs.browser != 'all' && fromJSON(format('["{0}"]', github.event.inputs.browser)) || fromJSON('["chromium","firefox","webkit"]') }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup monorepo
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Run Playwright E2E tests
        uses: ./.github/actions/test-playwright
        with:
          app: ${{ matrix.app }}
          browser: ${{ matrix.browser }}
          upload-results: 'true'
  
  report:
    name: Publish Test Report
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-reports
        continue-on-error: true

      - name: Publish Test Report
        uses: dorny/test-reporter@v2
        with:
          name: Playwright Tests
          path: "all-reports/**/results.xml"
          reporter: jest-junit
