name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: 🚀 Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Release summary
        if: steps.release.outputs.release_created == 'true'
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## 🎉 Release ${{ steps.release.outputs.tag_name }}

          ✅ New version released successfully!

          Check the [Releases page](https://github.com/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag_name }}) for details.
          EOF

  post-release:
    name: 🧪 Post-Release Validation
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup monorepo
        uses: ./.github/actions/setup
        with:
          node-version: '22'
          pnpm-version: '10.32.1'

      - name: Build all projects
        run: pnpm build

      - name: Validation summary
        run: |
          echo "## ✅ Post-Release Validation Passed" >> "$GITHUB_STEP_SUMMARY"
          echo "Version ${{ needs.release-please.outputs.version }} builds successfully." >> "$GITHUB_STEP_SUMMARY"
