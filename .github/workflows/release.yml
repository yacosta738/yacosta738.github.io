name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.32.1'

jobs:
  test:
    name: 🧪 Pre-Release Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup monorepo
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run lint
        uses: ./.github/actions/lint

      - name: Run unit tests
        uses: ./.github/actions/test-unit
        with:
          project: all
          coverage: 'true'

      - name: Build all projects
        run: pnpm build

  release:
    name: 🚀 Semantic Release
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup monorepo
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Verify authentication
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "🔐 Verifying authentication tokens (presence only)..."
          # Do NOT print token values — only check presence via environment variables

          if [ -z "$GITHUB_TOKEN" ]; then
            echo "::error::Missing required secret GITHUB_TOKEN"
            exit 1
          else
            echo "- GITHUB_TOKEN is set"
          fi

          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::Missing required secret NPM_TOKEN"
            exit 1
          else
            echo "- NPM_TOKEN is set"
          fi

      - name: Run semantic-release
        id: semantic_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          echo "🚀 Running semantic-release..."
          pnpm semantic-release
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release PR
        if: success() && steps.semantic_release.outputs.version != ''
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(release): ${{ steps.semantic_release.outputs.version }} [skip ci]"
          branch: release/${{ steps.semantic_release.outputs.version }}
          title: "chore(release): ${{ steps.semantic_release.outputs.version }}"
          body: |
            ## Release ${{ steps.semantic_release.outputs.version }}

            This PR contains the release changes created by Semantic Release.

            Please review and merge this PR to complete the release.

            📋 See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full release notes.
          base: main

      - name: Release summary
        if: success()
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## 🎉 Release Complete

          ✅ New version released successfully!

          Check the [Releases page](https://github.com/${{ github.repository }}/releases) for details.
          EOF

  post-release:
    name: 📢 Post-Release
    runs-on: ubuntu-latest
    needs: [release]
    if: success()
    timeout-minutes: 5
    steps:
      - name: Post-release tasks
        run: |
          echo "✅ Release workflow completed!"
          echo "📝 Changelog updated"
          echo "🏷️ Git tag created"
          echo "📦 GitHub Release published"
